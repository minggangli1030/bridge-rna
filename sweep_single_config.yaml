program: /global/scratch/users/minggangli/bridge-rna/sweep_train_single.sh
command:
  - ${env}
  - ${program}
method: bayes
metric:
  name: val_loss
  goal: minimize

parameters:
  # Architecture
  hidden_dim:
    values: [384, 512, 768]
  num_layers:
    values: [2, 4, 8]
  num_heads:
    values: [8]          # keep fixed; must divide hidden_dim evenly

  # Training
  learning_rate:
    distribution: log_uniform_values
    min: 1e-4
    max: 4e-4
  batch_size:
    values: [4, 8]
  weight_decay:
    values: [0.0, 0.01]

  # Masking
  mask_ratio:
    values: [0.10, 0.15, 0.20]

  # REE positional encoding
  ree_base:
    values: [50.0, 100.0, 200.0]

  # Fixed — don't sweep these
  epochs:
    values: [10]
  normalization:
    values: ["log1p_tpm"]
  early_stopping:
    values: [false]
  data_mode:
    values: ["streaming"]
  train_subset:
    values: [20000]
  val_subset:
    values: [4000]
